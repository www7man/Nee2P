<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#06060a" />
<title>Nee2P. — anonymous paired messenger</title>

<link rel="manifest" href="manifest.json" />
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />
<link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png" />
<link rel="apple-touch-icon" href="icons/icon-192.png" />

<!--
  No external font CDN: Tor / censorship-resistant deployments must not hit
  fonts.googleapis.com. We fall back to system fonts via --ff-ui / --ff-mono
  / --ff-serif below. To restore Geist / Geist Mono / Instrument Serif from
  Google Fonts, uncomment the original lines:
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800&family=Geist+Mono:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />
-->

<style>
  *, *::before, *::after { box-sizing: border-box; }

  :root {
    --bg-deep:     #06060a;
    --bg-base:     #0a0a10;

    --tx-100: #ffffff;
    --tx-80:  rgba(255,255,255,0.82);
    --tx-60:  rgba(255,255,255,0.62);
    --tx-40:  rgba(255,255,255,0.42);
    --tx-25:  rgba(255,255,255,0.25);

    --glass-fill-strong: rgba(255,255,255,0.08);
    --glass-fill-base:   rgba(255,255,255,0.05);
    --glass-fill-soft:   rgba(255,255,255,0.03);
    --glass-hairline:    rgba(255,255,255,0.12);
    --glass-highlight:   rgba(255,255,255,0.18);

    /* Self-hosted: no Google Fonts dependency. System stack first so a Tor
       user (or anyone behind a font-CDN block) gets a clean fallback. */
    --ff-ui:    -apple-system, BlinkMacSystemFont, system-ui, 'Segoe UI', Roboto, sans-serif;
    --ff-mono:  ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    --ff-serif: Georgia, 'Times New Roman', serif;
  }

  html, body {
    margin: 0; padding: 0;
    background: var(--bg-deep);
    color: var(--tx-100);
    font-family: var(--ff-ui);
    font-feature-settings: 'ss01', 'cv11';
    font-synthesis: none;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    min-height: 100vh;
    overflow: hidden;
    overscroll-behavior: none;
    /* App-like behaviour: no pinch-zoom, no iOS text-size adjust, no
       double-tap-to-zoom, no pull-to-refresh, no rubber-band scroll. */
    -webkit-text-size-adjust: 100%;
    text-size-adjust: 100%;
    touch-action: manipulation;
    -webkit-user-select: none;
    -webkit-touch-callout: none;
  }
  input, textarea { -webkit-user-select: text; user-select: text; }

  #stage {
    /* Pinned to the *visible* viewport, not the layout viewport. On iOS the
       soft keyboard can scroll the visual viewport down within the layout
       viewport (offsetTop > 0); without --vvtop, #stage stays at top:0 and
       a strip of body background shows between the app-frame's bottom CTA
       and the top of the keyboard. Updating only CSS variables (no React
       state) keeps inputs from being remounted on every visualViewport
       scroll/resize tick. */
    position: fixed;
    top:    var(--vvtop, 0px);
    left:   0;
    right:  0;
    height: var(--vvh, 100dvh);
    display: flex; align-items: stretch; justify-content: center;
  }

  /* on phones — fill the screen */
  .app-frame {
    position: relative;
    width: 100%;
    height: 100vh;        /* legacy fallback for iOS Safari <15.4 */
    height: 100dvh;       /* dynamic viewport height where supported */
    height: var(--vvh, 100dvh); /* JS-updated: shrinks when soft keyboard appears */
    overflow: hidden;
    background: var(--bg-deep);
  }

  /* Ambient gradient backdrop — shown on any screen wider than a phone.
     Painted on #stage::before so it sits behind the centered .app-frame.
     (Kept identical to the original; only the frame sizing policy below
     changed: the old 460×920 phone-in-a-frame is gone in favor of real
     tablet/desktop tiers.) */
  @media (min-width: 768px) {
    body { background: #03030a; }
    #stage::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(60% 40% at 20% 20%, rgba(80,100,140,0.10), transparent 70%),
        radial-gradient(50% 40% at 80% 80%, rgba(80,100,140,0.08), transparent 70%);
      pointer-events: none;
    }
  }

  /* tablet 768–1023px — centered, no phone frame. Single-column chat. */
  @media (min-width: 768px) and (max-width: 1023px) {
    .app-frame {
      max-width: 760px;
      margin: auto;
      align-self: center;
    }
  }

  /* desktop ≥1024px — fills the viewport, 2-column ChatScreen (sidebar + main). */
  @media (min-width: 1024px) {
    .app-frame {
      max-width: 1320px;
      width: 100%;
      height: 100dvh;
      margin: auto;
      align-self: stretch;
      border-radius: 0;
      box-shadow: none;
    }
  }

  /* ── orb / background animations ───────────────────────── */
  @keyframes float1 { 0%,100% { transform: translate(0,0) scale(1); } 50% { transform: translate(40px, 60px) scale(1.08); } }
  @keyframes float2 { 0%,100% { transform: translate(0,0) scale(1); } 50% { transform: translate(-60px, 40px) scale(0.92); } }
  @keyframes float3 { 0%,100% { transform: translate(0,0) scale(1); } 50% { transform: translate(50px, -50px) scale(1.1); } }
  @keyframes float4 { 0%,100% { transform: translate(0,0) scale(1); } 50% { transform: translate(-30px, -40px) scale(0.95); } }

  @keyframes svg-orbit { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  @keyframes ring-expand {
    0%   { transform: scale(0.2); opacity: 0; border-color: rgba(255,255,255,0.6); }
    15%  { opacity: 0.85; }
    100% { transform: scale(1.35); opacity: 0; border-color: rgba(255,255,255,0); }
  }
  @keyframes particle-trace {
    0%   { left: calc(50% - 44px); opacity: 0; }
    12%  { opacity: 1; }
    88%  { opacity: 1; }
    100% { left: calc(50% + 44px); opacity: 0; }
  }
  @keyframes particle-trace-rev {
    0%   { left: calc(50% + 44px); opacity: 0; }
    12%  { opacity: 1; }
    88%  { opacity: 1; }
    100% { left: calc(50% - 44px); opacity: 0; }
  }
  @keyframes welcome-rise {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes glyph-cycle {
    0%        { opacity: 0; transform: translateY(6px); filter: blur(4px); }
    15%, 82%  { opacity: 1; transform: translateY(0);  filter: blur(0); }
    100%      { opacity: 0; transform: translateY(-6px); filter: blur(4px); }
  }
  @keyframes pulse-dot {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(1.4); }
  }
  @keyframes scan {
    0% { transform: translateY(-100%); }
    100% { transform: translateY(100%); }
  }
  @keyframes fade-up {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes shine-sweep {
    0% { transform: translateX(-100%) skewX(-20deg); }
    100% { transform: translateX(250%) skewX(-20deg); }
  }
  @keyframes caret {
    0%, 49% { opacity: 1; }
    50%, 100% { opacity: 0; }
  }
  @keyframes drift-slow {
    0%, 100% { transform: rotate(0deg); }
    50% { transform: rotate(360deg); }
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .no-scrollbar::-webkit-scrollbar { display: none; }
  .no-scrollbar { scrollbar-width: none; }

  .typing-caret {
    display: inline-block; width: 2px; height: 1em;
    background: currentColor; vertical-align: text-bottom;
    margin-left: 2px;
    animation: caret 1s steps(1) infinite;
  }

  input::placeholder, textarea::placeholder { color: var(--tx-40); }

  /* Screen-privacy: when the tab loses focus, blur chat message bubbles +
     the share-code card. Reveals nothing readable to an over-the-shoulder
     glance or to an OS app-switcher preview. Inputs and timer stay readable. */
  body.is-blurred [data-mid],
  body.is-blurred [data-mid] *,
  body.is-blurred [data-share-card] {
    filter: blur(14px) saturate(0.4);
  }
  [data-mid], [data-share-card] { transition: filter 0.18s ease; }
</style>
</head>
<body>
<div id="stage">
  <div id="boot-loader" style="position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;background:#06060a;color:#fff;font-family:'Instrument Serif',serif;font-style:italic">
    <div style="font-size:48px">Nee2P.</div>
    <div style="font-size:11px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.45);font-family:system-ui,-apple-system,sans-serif;font-style:normal">loading…</div>
  </div>
</div>

<noscript><div style="padding:24px;color:#fff;font-family:sans-serif">JavaScript нужен для работы.</div></noscript>

<script>
// --vvh + --vvtop: track the visual viewport so #stage stays glued to it.
//   --vvh   = visualViewport.height   (shrinks when the soft keyboard opens)
//   --vvtop = visualViewport.offsetTop (iOS: > 0 when the visible viewport
//             is scrolled within the layout viewport because the keyboard
//             pushed it). Without --vvtop, the app-frame sits at top:0 of
//             the layout viewport and a strip of body background appears
//             between its bottom CTA and the keyboard.
//
// Safety: we update ONLY CSS variables here — no React state, no DOM
// re-mounts. The earlier React-hook version of this (with `scroll`) caused
// (a) the first tap on a fresh input to be swallowed and (b) flicker
// during typing, because each scroll tick re-rendered the React tree and
// remounted the <input>. CSS-only updates are free of that side effect.
(function () {
  var doc = document.documentElement;
  function updateVv() {
    var vv = window.visualViewport;
    var h  = vv ? vv.height    : window.innerHeight;
    var t  = vv ? vv.offsetTop : 0;
    doc.style.setProperty('--vvh',   h + 'px');
    doc.style.setProperty('--vvtop', t + 'px');
  }
  updateVv();
  if (window.visualViewport) {
    // `scroll` is what fires when offsetTop changes (keyboard push on iOS).
    // `resize` is what fires when height changes (keyboard show/hide).
    window.visualViewport.addEventListener('resize', updateVv);
    window.visualViewport.addEventListener('scroll', updateVv);
  } else {
    window.addEventListener('resize', updateVv);
  }
})();
</script>

<script>
// Screen-privacy: toggle body.is-blurred whenever the tab loses focus
// or visibility (e.g. switching apps on mobile — iOS will snapshot the
// blurred state for the app-switcher preview).
(function () {
  function setBlur(on) {
    document.body.classList.toggle('is-blurred', !!on);
  }
  document.addEventListener('visibilitychange', function () {
    setBlur(document.visibilityState !== 'visible');
  });
  window.addEventListener('blur',  function () { setBlur(true); });
  window.addEventListener('focus', function () { setBlur(false); });
})();
</script>

<script>
window.addEventListener('error', function (e) {
  var stage = document.getElementById('stage');
  if (!stage) return;
  if (stage.dataset.hadError === '1') return;
  stage.dataset.hadError = '1';
  var msg = (e && (e.message || (e.error && e.error.message))) || 'unknown error';
  var src = (e && (e.filename || (e.error && e.error.fileName))) || '';
  stage.innerHTML =
    '<div style="position:fixed;inset:0;padding:24px;background:#06060a;color:#fff;' +
    'font:14px/1.5 system-ui,-apple-system,sans-serif;overflow:auto">' +
      '<div style="font-weight:600;margin-bottom:8px">Nee2P. — ошибка загрузки</div>' +
      '<div style="color:rgba(255,255,255,0.7);white-space:pre-wrap;word-break:break-word">' +
        msg.replace(/[<>&]/g, function (c) { return ({'<':'&lt;','>':'&gt;','&':'&amp;'})[c]; }) +
        (src ? '\n\n@ ' + src : '') +
      '</div>' +
      '<div style="margin-top:18px;color:rgba(255,255,255,0.4);font-size:12px">' +
        'Жёсткая перезагрузка: Cmd/Ctrl + Shift + R' +
      '</div>' +
    '</div>';
}, true);
</script>

<script>
  // Register service worker for PWA install + Web Push. Best-effort: do NOT
  // block boot if registration fails (e.g. http://, private mode, etc.).
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function () {
      navigator.serviceWorker.register('sw.js').catch(function (e) {
        try { console.warn('sw register failed', e); } catch (_) {}
      });
    });
    // Auto-reload once a new SW takes control. Without this, after a deploy
    // users on an old SW keep seeing stale code until they hard-reload. The
    // `refreshing` guard prevents reload loops when several SWs claim in
    // succession (Chrome fires controllerchange more than once on update).
    //
    // IMPORTANT: only reload when an *existing* SW was already in control
    // (i.e. this is a SW *update*, not a first install). On a brand-new origin
    // (e.g. a fresh tunnel URL like pinggy) there is no old SW, so the page
    // already loaded fresh from the network — reloading would only interrupt
    // any session the user is about to create and serves no purpose.
    var hadController = !!navigator.serviceWorker.controller;
    var refreshing = false;
    navigator.serviceWorker.addEventListener('controllerchange', function () {
      if (!hadController) return; // first install on this origin — no reload needed
      if (refreshing) return;
      refreshing = true;
      location.reload();
    });
  }
</script>

<script src="push.js"></script>

<!-- App version (read by WelcomeScreen Open Source badge) -->
<script src="version.js"></script>

<!--
  Vendored React + Babel. Original CDN URLs (kept for one-line rollback):
    <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
-->
<script src="vendor/react.production.min.js"></script>
<script src="vendor/react-dom.production.min.js"></script>
<script src="vendor/babel.min.js"></script>

<script src="md5.js"></script>
<!--
  Crypto deps loaded BEFORE crypto.js so it can see the argon2 global.
  argon2-browser bundles the WASM inline (~200KB). If the file is missing
  for some reason, crypto.js falls back to PBKDF2-SHA256-200k.

  X25519 fallback: WebCrypto Subtle X25519 is the primary path (Chrome 133+,
  Safari 18.4+, Firefox 130+). If Subtle X25519 isn't available, crypto.js
  lazily ESM-imports vendor/noble-ed25519.bundle.mjs (which re-exports x25519)
  at ephemeral-keypair time. Same for ML-KEM-768 via vendor/mlkem.bundle.mjs.
  Both ESM bundles are self-contained — no further network fetches.

  Original CDN URL kept for one-line rollback:
    <script src="https://cdn.jsdelivr.net/npm/argon2-browser@1.18.0/dist/argon2-bundled.min.js" crossorigin="anonymous"></script>
-->
<script src="vendor/argon2-bundled.min.js"></script>
<!--
  BIP-39 English wordlist (2048 words) — used by Nee2PCrypto.safetyNumber()
  to render the 12-word session fingerprint shown in the "Безопасность
  сессии" modal. Loaded BEFORE crypto.js so the helper can find it.
-->
<script src="vendor/bip39-en.js"></script>
<!-- QR code generator (qrcode-generator@1.4.4) for share-via-QR. -->
<script src="vendor/qrcode.min.js"></script>
<script src="crypto.js"></script>
<!--
  Opt-in "Remember me on this device" persistence layer. Loaded AFTER crypto.js
  because it depends on Nee2PCrypto.generateDeviceKey / wrapWithDeviceKey /
  unwrapWithDeviceKey. Exposes window.Nee2PPersist. Default-disabled: no IDB
  writes happen until the user ticks the checkbox and we call enable().
-->
<script src="persistence.js"></script>
<!--
  http-client.js exposes window.Nee2PWS using POST + long-poll (Yandex CDN
  doesn't forward WebSocket upgrade). ws-client.js is the legacy WS
  transport — kept in the repo for direct/dev use.
-->
<script src="http-client.js"></script>
<!--
  WebRTC peer-to-peer calls. Self-contained — no external dependencies.
  Exposes window.NeeCall. Audio-only on MVP; DTLS-SRTP gives E2E media
  encryption natively. Signalling rides the existing room channel as the
  wire type 'signal' (broadcast-only, never stored in history server-side).
-->
<!--
  Internationalisation layer. Exposes window.Nee2Pi18n: t(), setLang(),
  getLang(), useLang() hook. Lang stored in localStorage('nee2p_lang').
  Auto-detects RU/EN from navigator.language on first visit.
-->
<script src="i18n.js"></script>
<script src="webrtc.js"></script>

<!--
  Connection-mode foundation (Mode 2 = Direct P2P, Mode 3 = LAN).
  Loaded after crypto.js + webrtc.js since both modules depend on them.
  These are inert until the UI mode switcher wires them in (Phase 2).
-->
<script src="tracker-rendezvous.js"></script>
<script src="p2p-session.js"></script>
<script src="net-probe.js"></script>
<script src="transport.js"></script>

<script>
// Auto cache-bust: version = YYYYMMDDHH (UTC), changes every hour.
// No manual bumping needed — browsers always load the current hour's copy.
(function () {
  var d = new Date();
  var v = d.getUTCFullYear()
        + String(d.getUTCMonth() + 1).padStart(2, '0')
        + String(d.getUTCDate()).padStart(2, '0')
        + String(d.getUTCHours()).padStart(2, '0');
  ['nee2p-ui.jsx', 'nee2p-screens.jsx', 'nee2p-app.jsx'].forEach(function (f) {
    var s = document.createElement('script');
    s.type = 'text/babel';
    s.src = f + '?v=' + v;
    document.head.appendChild(s);
  });
})();
</script>
</body>
