<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nee2P — Admin</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #06060a;
    --surface: rgba(255,255,255,0.04);
    --surface-hover: rgba(255,255,255,0.07);
    --border: rgba(255,255,255,0.08);
    --text: #e8e8f0;
    --muted: #6b6b80;
    --accent: #7b61ff;
    --green: #34d399;
    --red: #f87171;
    --yellow: #fbbf24;
    --font: -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    --mono: ui-monospace, SFMono-Regular, Menlo, monospace;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    font-size: 14px;
    line-height: 1.5;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
  }

  /* ── Layout ── */
  .header {
    padding: 18px 24px 14px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }

  .header h1 {
    font-size: 16px;
    font-weight: 600;
    letter-spacing: .02em;
    white-space: nowrap;
  }

  .header h1 span { color: var(--accent); }

  .main { flex: 1; padding: 20px 24px; display: flex; flex-direction: column; gap: 20px; }

  .statusbar {
    padding: 8px 24px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    color: var(--muted);
    font-size: 11px;
    flex-wrap: wrap;
    gap: 4px;
  }

  /* ── Key bar ── */
  .keybar {
    display: flex;
    align-items: center;
    gap: 8px;
    flex: 1;
    min-width: 200px;
  }

  .keybar label { color: var(--muted); font-size: 12px; white-space: nowrap; }

  .keybar input {
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    padding: 5px 10px;
    outline: none;
    flex: 1;
    min-width: 120px;
    max-width: 260px;
    transition: border-color .15s;
  }
  .keybar input:focus { border-color: var(--accent); }

  /* ── Buttons ── */
  .btn {
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    cursor: pointer;
    font-family: var(--font);
    font-size: 12px;
    padding: 5px 12px;
    transition: background .15s;
    white-space: nowrap;
  }
  .btn:hover { background: rgba(255,255,255,0.1); }
  .btn.accent { background: rgba(123,97,255,0.18); border-color: rgba(123,97,255,0.35); color: #b5a7ff; }
  .btn.accent:hover { background: rgba(123,97,255,0.28); }

  /* ── Refresh bar ── */
  .refreshbar {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  .countdown { color: var(--muted); font-size: 12px; min-width: 110px; }

  /* ── Stats cards ── */
  .cards {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 12px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
  }

  .card-label {
    color: var(--muted);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: .06em;
    margin-bottom: 6px;
  }

  .card-value {
    font-size: 22px;
    font-weight: 700;
    line-height: 1;
    color: #fff;
  }

  .card-value.accent { color: var(--accent); }
  .card-value.green  { color: var(--green); }

  /* ── Error / empty states ── */
  .notice {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 32px;
    text-align: center;
    color: var(--muted);
    font-size: 14px;
  }

  .notice.error { border-color: rgba(248,113,113,0.3); color: var(--red); }

  /* ── Table ── */
  .table-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }

  .table-scroll { overflow-x: auto; }

  table {
    width: 100%;
    border-collapse: collapse;
    white-space: nowrap;
  }

  th {
    background: rgba(255,255,255,0.03);
    color: var(--muted);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: .06em;
    text-transform: uppercase;
    padding: 10px 14px;
    text-align: left;
    border-bottom: 1px solid var(--border);
  }

  td {
    padding: 10px 14px;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    font-size: 13px;
    vertical-align: middle;
  }

  tr:last-child td { border-bottom: none; }

  tr:hover td { background: rgba(255,255,255,0.04); }

  .mono { font-family: var(--mono); font-size: 12px; }
  .muted { color: var(--muted); }
  .green { color: var(--green); }
  .red   { color: var(--red); }
  .yellow { color: var(--yellow); }

  .dot {
    display: inline-block;
    width: 7px; height: 7px;
    border-radius: 50%;
    margin-right: 5px;
    background: var(--muted);
    vertical-align: middle;
  }
  .dot.on { background: var(--green); }

  .table-title {
    padding: 12px 16px 10px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: .04em;
    color: var(--muted);
    text-transform: uppercase;
    border-bottom: 1px solid var(--border);
  }
</style>
</head>
<body>

<div class="header">
  <h1>Nee2P <span>Admin</span></h1>

  <div class="keybar">
    <label>API Key</label>
    <input id="apiKey" type="password" placeholder="nee2p-admin-local" autocomplete="off">
    <button class="btn" onclick="saveKey()">Сохранить</button>
  </div>

  <div class="refreshbar">
    <span class="countdown" id="countdown">обновление через 5с</span>
    <button class="btn accent" onclick="fetchStats()">Обновить</button>
  </div>
</div>

<div class="main">
  <div class="cards" id="cards">
    <!-- filled by JS -->
  </div>

  <div id="notice" class="notice" style="display:none"></div>

  <div class="table-wrap" id="tableWrap" style="display:none">
    <div class="table-title">Активные комнаты</div>
    <div class="table-scroll">
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Создана</th>
            <th>Истекает</th>
            <th>Слоты</th>
            <th>Спарено</th>
            <th>Онлайн</th>
            <th>Сообщений</th>
            <th>Блобы</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>
</div>

<div class="statusbar">
  <span id="statusLeft">—</span>
  <span id="statusRight">—</span>
</div>

<script>
'use strict';

// ── Config ──────────────────────────────────────────────
const REFRESH_INTERVAL = 5; // seconds

function getApiUrl() {
  const params = new URLSearchParams(location.search);
  if (location.hostname === 'localhost' || location.hostname === '127.0.0.1') {
    const port = params.get('port') || '3000';
    return `http://localhost:${port}/r/admin/stats`;
  }
  return '/2Pee/r/admin/stats';
}

// ── Key persistence ──────────────────────────────────────
const keyInput = document.getElementById('apiKey');
keyInput.value = localStorage.getItem('nee2p_admin_key') || 'nee2p-admin-local';

function saveKey() {
  localStorage.setItem('nee2p_admin_key', keyInput.value.trim());
  fetchStats();
}

// ── Countdown timer ──────────────────────────────────────
let countdown = REFRESH_INTERVAL;
let countdownId = null;

function startCountdown() {
  clearInterval(countdownId);
  countdown = REFRESH_INTERVAL;
  updateCountdown();
  countdownId = setInterval(() => {
    countdown--;
    updateCountdown();
    if (countdown <= 0) {
      fetchStats();
    }
  }, 1000);
}

function updateCountdown() {
  document.getElementById('countdown').textContent =
    countdown > 0 ? `обновление через ${countdown}с` : 'обновляется…';
}

// ── Formatting helpers ────────────────────────────────────
function fmtBytes(b) {
  if (b === 0) return '0 B';
  if (b < 1024) return b + ' B';
  if (b < 1024 * 1024) return (b / 1024).toFixed(1) + ' KB';
  return (b / (1024 * 1024)).toFixed(2) + ' MB';
}

function fmtUptime(sec) {
  const h = Math.floor(sec / 3600);
  const m = Math.floor((sec % 3600) / 60);
  if (h === 0) return `${m}м`;
  return `${h}ч ${m}м`;
}

function relTime(ts) {
  const diff = Math.floor((Date.now() - ts) / 1000);
  if (diff < 60) return `${diff}с назад`;
  if (diff < 3600) return `${Math.floor(diff / 60)}м назад`;
  if (diff < 86400) return `${Math.floor(diff / 3600)}ч назад`;
  return `${Math.floor(diff / 86400)}д назад`;
}

function relFuture(ts) {
  const diff = Math.floor((ts - Date.now()) / 1000);
  if (diff <= 0) return '<span class="red">истекло</span>';
  if (diff < 3600) return `<span class="red">${Math.floor(diff / 60)}м</span>`;
  if (diff < 86400) return `${Math.floor(diff / 3600)}ч ${Math.floor((diff % 3600) / 60)}м`;
  return `${Math.floor(diff / 86400)}д`;
}

function esc(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

// ── Render ───────────────────────────────────────────────
function renderCards(d) {
  const cards = document.getElementById('cards');
  cards.innerHTML = `
    <div class="card">
      <div class="card-label">Комнаты</div>
      <div class="card-value accent">${d.roomCount}</div>
    </div>
    <div class="card">
      <div class="card-label">Сессии</div>
      <div class="card-value">${d.sessionCount}</div>
    </div>
    <div class="card">
      <div class="card-label">Спарено</div>
      <div class="card-value green">${d.pairedCount}</div>
    </div>
    <div class="card">
      <div class="card-label">История</div>
      <div class="card-value" style="font-size:16px;padding-top:4px">${fmtBytes(d.totalHistoryBytes)}</div>
    </div>
    <div class="card">
      <div class="card-label">Блобы</div>
      <div class="card-value" style="font-size:16px;padding-top:4px">${fmtBytes(d.relayBlobBytes)}</div>
    </div>
    <div class="card">
      <div class="card-label">Аптайм</div>
      <div class="card-value" style="font-size:16px;padding-top:4px">${fmtUptime(d.uptime)}</div>
    </div>
  `;
}

function renderTable(rooms) {
  const notice = document.getElementById('notice');
  const tableWrap = document.getElementById('tableWrap');

  if (rooms.length === 0) {
    notice.className = 'notice';
    notice.textContent = 'Нет активных комнат';
    notice.style.display = '';
    tableWrap.style.display = 'none';
    return;
  }

  notice.style.display = 'none';
  tableWrap.style.display = '';

  const tbody = document.getElementById('tbody');
  tbody.innerHTML = rooms.map(r => {
    const sealedCount = r.slotsSealed.filter(Boolean).length;
    const fullSealed = sealedCount === r.groupMax;
    const slotsDisplay = fullSealed
      ? `<span class="green">${sealedCount}/${r.groupMax}</span>`
      : `${sealedCount}/${r.groupMax}`;

    const pairedCell = r.paired
      ? '<span class="green">&#10003;</span>'
      : '<span class="muted">—</span>';

    const onlineCell = r.onlineCount > 0
      ? `<span class="dot on"></span><span class="green">${r.onlineCount}</span>`
      : `<span class="dot"></span><span class="muted">0</span>`;

    const blobCell = r.blobCount > 0
      ? `${r.blobCount} <span class="muted">(${fmtBytes(r.blobBytes)})</span>`
      : '<span class="muted">—</span>';

    return `<tr>
      <td class="mono">${esc(r.id.slice(0, 8))}</td>
      <td class="muted">${relTime(r.createdAt)}</td>
      <td>${relFuture(r.expiresAt)}</td>
      <td>${slotsDisplay}</td>
      <td>${pairedCell}</td>
      <td>${onlineCell}</td>
      <td>${r.msgCount > 0 ? r.msgCount : '<span class="muted">0</span>'}</td>
      <td>${blobCell}</td>
    </tr>`;
  }).join('');
}

function showError(msg) {
  const notice = document.getElementById('notice');
  const tableWrap = document.getElementById('tableWrap');
  notice.className = 'notice error';
  notice.textContent = msg;
  notice.style.display = '';
  tableWrap.style.display = 'none';
  document.getElementById('cards').innerHTML = '';
}

// ── Fetch ────────────────────────────────────────────────
async function fetchStats() {
  const key = keyInput.value.trim() || 'nee2p-admin-local';
  let json;
  try {
    const resp = await fetch(getApiUrl(), {
      headers: { 'x-admin-key': key },
    });
    if (resp.status === 403) {
      showError('Неверный ключ');
      startCountdown();
      return;
    }
    if (!resp.ok) {
      showError(`Ошибка сервера: HTTP ${resp.status}`);
      startCountdown();
      return;
    }
    json = await resp.json();
  } catch {
    showError('Сервер недоступен');
    startCountdown();
    return;
  }

  if (!json.ok) {
    showError(json.error || 'Неизвестная ошибка');
    startCountdown();
    return;
  }

  const d = json.data;
  renderCards(d);
  renderTable(d.rooms);

  const now = new Date();
  document.getElementById('statusLeft').textContent =
    `Обновлено: ${now.toISOString()}`;
  document.getElementById('statusRight').textContent =
    `Комнат: ${d.roomCount}`;

  startCountdown();
}

// ── Init ─────────────────────────────────────────────────
fetchStats();
</script>
</body>
</html>
