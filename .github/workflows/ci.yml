name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Node ${{ matrix.node }} smoke test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install
        run: npm ci

      - name: Boot relay
        run: |
          PORT=9787 HOST=127.0.0.1 node server.js &
          echo $! > server.pid
          # Wait for the relay to answer
          for i in $(seq 1 20); do
            if curl -fsS http://127.0.0.1:9787/ > /dev/null; then
              echo "Relay is up"
              exit 0
            fi
            sleep 0.5
          done
          echo "Relay did not start in time"
          exit 1

      - name: Wire-format smoke test
        run: node tools/smoke-wire-format.js

      - name: Presence + bi-directional delivery smoke test
        run: node tools/smoke-presence.js

      - name: Signal wire-type smoke test (WebRTC call signaling)
        run: node tools/smoke-signal-wire.js

      - name: i18n catalog smoke test
        run: node tools/smoke-i18n.js

      - name: trust.html ↔ crypto.js sync smoke test
        run: node tools/smoke-trust-crypto-sync.js

      - name: Stop relay
        if: always()
        run: |
          if [ -f server.pid ]; then
            kill "$(cat server.pid)" || true
          fi

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t nee2p:ci .
      - name: Boot container
        run: |
          docker run -d --name nee2p -p 8787:8787 nee2p:ci
          for i in $(seq 1 20); do
            if curl -fsS http://127.0.0.1:8787/ > /dev/null; then
              echo "Container is up"
              docker logs nee2p
              docker stop nee2p
              exit 0
            fi
            sleep 0.5
          done
          docker logs nee2p
          exit 1

  audit:
    name: npm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm audit --omit=dev --audit-level=moderate
        continue-on-error: true
