name: Bug report
description: Something is broken or behaves unexpectedly
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        ⚠️ **Security bugs:** do NOT use this form. See [SECURITY.md](https://github.com/www7man/Nee2P/blob/main/SECURITY.md).

  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: Steps to reproduce, plus expected vs. actual behaviour
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser / OS
      placeholder: "Firefox 124 / macOS 14.4"

  - type: input
    id: commit
    attributes:
      label: Commit hash
      description: Output of `git rev-parse HEAD`
      placeholder: "c604dad"

  - type: textarea
    id: logs
    attributes:
      label: Console / server logs
      description: Paste relevant lines — **redact any secret phrases or VAPID keys**
      render: shell

  - type: checkboxes
    id: phrase-check
    attributes:
      label: Confirm
      options:
        - label: I did not paste my secret phrase or any key material into this issue
          required: true
